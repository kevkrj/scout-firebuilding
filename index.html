<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scout Firebuilding Competition</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1008; --bg-card: #2a1c0e; --bg-input: #3a2a18;
  --border: #5a3a1a; --text: #f0dcc0; --text-dim: #a08060;
  --orange: #e87020; --amber: #f0a030; --gold: #ffd700;
  --green: #40a040; --green-dim: #1a3a1a;
  --red: #d03030; --red-dim: #3a1010;
  --radius: 10px;
}
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; -webkit-tap-highlight-color: transparent;
}
.screen { display: none; padding: 16px; padding-bottom: 100px; max-width: 600px; margin: 0 auto; }
.screen.active { display: block; }
h1 { font-size: 1.5rem; text-align: center; color: var(--amber); margin-bottom: 16px; }
h2 { font-size: 1.2rem; color: var(--amber); margin-bottom: 12px; }
h3 { font-size: 1rem; color: var(--text-dim); margin-bottom: 8px; }

.btn {
  display: block; width: 100%; padding: 14px 16px; margin-bottom: 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-card); color: var(--text); font-size: 1rem;
  cursor: pointer; text-align: left; transition: background 0.15s;
}
.btn:active { background: var(--bg-input); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn-orange { background: var(--orange); color: #fff; border-color: var(--orange); text-align: center; font-weight: 600; }
.btn-orange:active { background: #c05818; }
.btn-red { background: var(--red); color: #fff; border-color: var(--red); text-align: center; }
.btn-red:active { background: #a02020; }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); text-align: center; font-weight: 600; }
.btn-green:active { background: #308030; }
.btn-sm { display: inline-block; width: auto; padding: 8px 16px; font-size: 0.9rem; }
.btn-icon { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; padding: 0; text-align: center; flex-shrink: 0; }

.nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.nav-grid .btn { text-align: center; padding: 20px 12px; }
.nav-grid .btn .nav-emoji { font-size: 1.8rem; display: block; margin-bottom: 6px; }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }

input[type="text"], input[type="number"] {
  width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-input); color: var(--text); font-size: 1rem;
}
input[type="number"] { text-align: center; -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

.input-row { display: flex; gap: 10px; margin-bottom: 10px; }
.input-row input { flex: 1; }

.team-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; margin-bottom: 6px; border-radius: var(--radius);
  background: var(--bg-card); border: 1px solid var(--border); cursor: pointer;
}
.team-item.scored { background: var(--green-dim); border-color: var(--green); }
.team-item .name { flex: 1; font-size: 1rem; }
.team-item .badge { font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; background: var(--green); color: #fff; margin-left: 8px; }
.team-item .remove-btn { color: var(--red); font-size: 1.4rem; padding: 4px 10px; cursor: pointer; background: none; border: none; line-height: 1; }

.criterion-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.criterion-row label { flex: 1; font-size: 0.95rem; line-height: 1.3; }
.criterion-row .max { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; }
.criterion-row input[type="number"] { width: 70px; flex-shrink: 0; }

.total-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: var(--bg-input); border-radius: var(--radius); margin: 16px 0; font-size: 1.2rem; font-weight: 600; }
.total-bar .pts { color: var(--amber); }

.lb-item { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
.lb-rank { font-size: 1.4rem; font-weight: 700; color: var(--amber); width: 36px; text-align: center; flex-shrink: 0; }
.lb-rank.r1 { color: var(--gold); }
.lb-rank.r2 { color: #c0c0c0; }
.lb-rank.r3 { color: #cd7f32; }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
.lb-score { font-size: 0.9rem; color: var(--amber); margin-bottom: 6px; }
.lb-bar-bg { height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.lb-bar-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--amber)); border-radius: 4px; transition: width 0.3s; }
.lb-cats { display: flex; flex-wrap: wrap; gap: 4px; }
.lb-cat { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: var(--bg-input); color: var(--text-dim); }
.lb-cat.time-cat { background: var(--orange); color: #fff; }

.timer-display { text-align: center; padding: 20px 16px; }
.timer-time { font-size: 5rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--amber); line-height: 1; margin-bottom: 16px; }
.timer-label { font-size: 1.5rem; color: var(--text-dim); margin-bottom: 20px; }
.timer-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.timer-controls .btn { width: auto; min-width: 120px; text-align: center; }

.mark-section { border-top: 1px solid var(--border); padding-top: 16px; }
.mark-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; margin-bottom: 6px; border-radius: var(--radius);
  background: var(--bg-card); border: 1px solid var(--border);
}
.mark-item.marked { background: var(--green-dim); border-color: var(--green); }
.mark-item .name { flex: 1; font-size: 1rem; }
.mark-item .mark-time { color: var(--amber); font-weight: 600; font-size: 0.9rem; margin-right: 10px; }
.mark-item .mark-pts { color: var(--text-dim); font-size: 0.8rem; margin-right: 10px; }
.mark-btn { background: var(--orange); color: #fff; border: none; border-radius: var(--radius); padding: 8px 16px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
.mark-btn:active { background: #c05818; }
.undo-btn { background: var(--bg-input); color: var(--text-dim); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 0.8rem; cursor: pointer; }

.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff; padding: 12px 24px; border-radius: var(--radius);
  font-size: 0.95rem; z-index: 1000; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
}
.toast.error { background: var(--red); }
.toast.show { opacity: 1; }

.back-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.back-bar h1 { margin-bottom: 0; flex: 1; text-align: left; }

.ref-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.85rem; }
.ref-table th { text-align: left; padding: 6px 8px; color: var(--amber); border-bottom: 1px solid var(--border); }
.ref-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.ref-table td:last-child { text-align: right; color: var(--text-dim); white-space: nowrap; }

.admin-section { margin-bottom: 24px; }
.admin-section h2 { border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.empty-state { text-align: center; color: var(--text-dim); padding: 40px 16px; font-size: 1rem; }
.status-bar { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 12px; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.status-dot.live { background: var(--green); }
.status-dot.off { background: var(--red); }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>Scout Firebuilding Competition</h1>
  <div id="homeStatus" class="status-bar"></div>
  <div class="nav-grid">
    <button class="btn" onclick="showScreen('admin')"><span class="nav-emoji">&#9881;</span>Admin</button>
    <button class="btn" onclick="showScreen('timer-view')"><span class="nav-emoji">&#9201;</span>Stopwatch</button>
    <button class="btn" onclick="showJudge(0)"><span class="nav-emoji">&#128737;</span>Safety</button>
    <button class="btn" onclick="showJudge(1)"><span class="nav-emoji">&#128293;</span>Fire Lay</button>
    <button class="btn" onclick="showJudge(2)"><span class="nav-emoji">&#128736;</span>Technique</button>
    <button class="btn" onclick="showJudge(3)"><span class="nav-emoji">&#127775;</span>Fire Perf</button>
    <button class="btn" onclick="showJudge(4)"><span class="nav-emoji">&#127807;</span>LNT / Cleanup</button>
    <button class="btn btn-orange" onclick="showScreen('leaderboard')" style="grid-column:1/-1"><span class="nav-emoji">&#127942;</span>Leaderboard</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="back-bar">
    <button class="btn btn-icon" onclick="showScreen('home')">&#8592;</button>
    <h1>Admin</h1>
  </div>
  <div class="admin-section">
    <h2>Teams</h2>
    <div class="input-row">
      <input type="text" id="newName" placeholder="Team name" maxlength="60"
             onkeydown="if(event.key==='Enter')addTeam()">
      <button class="btn btn-orange btn-sm" onclick="addTeam()">Add</button>
    </div>
    <div id="teamList"></div>
  </div>
  <div class="admin-section">
    <h2>Stopwatch</h2>
    <div style="display:flex;gap:10px">
      <button class="btn btn-green" onclick="startTimer()" style="flex:1">Start</button>
      <button class="btn btn-red" onclick="stopTimer()" style="flex:1">Stop</button>
      <button class="btn" onclick="resetTimer()" style="flex:1">Reset</button>
    </div>
  </div>
  <div class="admin-section">
    <h2>Data</h2>
    <button class="btn btn-red" onclick="resetScores()">Reset All Scores</button>
    <button class="btn btn-red" onclick="resetAll()">Clear Everything</button>
  </div>
</div>

<!-- JUDGE LIST -->
<div id="judge" class="screen">
  <div class="back-bar">
    <button class="btn btn-icon" onclick="showScreen('home')">&#8592;</button>
    <h1 id="judgeTitle"></h1>
  </div>
  <div class="card" id="judgeRef"></div>
  <h3 style="margin-top:16px">Tap a team to score:</h3>
  <div id="judgeTeams"></div>
</div>

<!-- SCORING -->
<div id="scoring" class="screen">
  <div class="back-bar">
    <button class="btn btn-icon" onclick="backToJudge()">&#8592;</button>
    <h1 id="scoringTitle"></h1>
  </div>
  <div id="scoringCriteria"></div>
  <div class="total-bar">
    <span>Total</span>
    <span class="pts" id="scoringTotal">0 / 0</span>
  </div>
  <button class="btn btn-green" onclick="submitScore()">Submit Score</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="screen">
  <div class="back-bar">
    <button class="btn btn-icon" onclick="showScreen('home')">&#8592;</button>
    <h1>Leaderboard</h1>
  </div>
  <div id="lbStatus" class="status-bar"></div>
  <div id="leaderboardList"></div>
</div>

<!-- TIMER VIEW -->
<div id="timer-view" class="screen">
  <div class="back-bar">
    <button class="btn btn-icon" onclick="showScreen('home')">&#8592;</button>
    <h1>Stopwatch</h1>
  </div>
  <div class="timer-display">
    <div id="timerLabel" class="timer-label">Ready</div>
    <div id="timerDisplay" class="timer-time">00:00</div>
    <div class="timer-controls">
      <button class="btn btn-green btn-sm" onclick="startTimer()">Start</button>
      <button class="btn btn-red btn-sm" onclick="stopTimer()">Stop</button>
      <button class="btn btn-sm" onclick="resetTimer()">Reset</button>
    </div>
  </div>
  <div id="markSection" class="mark-section" style="display:none">
    <h2>Completion Times</h2>
    <div id="markList"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

var CATEGORIES = [
  { name: 'Safety', max: 25, criteria: [
    { label: 'Safety zone maintained', max: 10 },
    { label: 'Safe match/tool handling', max: 8 },
    { label: 'Fire safety awareness', max: 7 }
  ]},
  { name: 'Fire Lay', max: 25, criteria: [
    { label: 'Tinder \u2192 kindling \u2192 fuel progression', max: 10 },
    { label: 'Structurally sound lay', max: 10 },
    { label: 'Correct lay style', max: 5 }
  ]},
  { name: 'Technique', max: 20, criteria: [
    { label: 'Works efficiently', max: 8 },
    { label: 'Minimal matches (1 match = full pts)', max: 10 },
    { label: 'Explains process when asked', max: 2 }
  ]},
  { name: 'Fire Performance', max: 20, criteria: [
    { label: 'Fire ignites', max: 10 },
    { label: 'Sustains 3\u20135 min', max: 5 },
    { label: 'Burns through suspended string', max: 5 }
  ]},
  { name: 'LNT / Cleanup', max: 10, criteria: [
    { label: 'Fire cold to touch', max: 5 },
    { label: 'Area restored', max: 3 },
    { label: 'Ash disposed properly', max: 2 }
  ]}
];

var TIME_MAX_POINTS = 15;
var JUDGE_MAX = 100;
var TOTAL_MAX = JUDGE_MAX + TIME_MAX_POINTS;
var POLL_MS = 3000;

// ---- State ----
var S = { teams: [], scores: {}, timer: null, completionTimes: {} };
var serverOffset = 0;
var currentCatIdx = 0;
var currentTeam = '';
var activeScreen = 'home';
var pollId = null;
var tickId = null;

// ---- Helpers ----
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg, err) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (err ? ' error' : '') + ' show';
  clearTimeout(toast._t);
  toast._t = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

function fmtTime(sec) {
  if (sec == null) return 'DNF';
  var m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function serverNow() { return Date.now() + serverOffset; }

// Rank-based time scoring: fastest team gets TIME_MAX_POINTS,
// others get proportionally less based on (fastest / their_time)
function calcAllTimeScores() {
  var ct = S.completionTimes || {};
  var times = [];
  for (var name in ct) {
    if (ct[name] != null) times.push({ name: name, time: ct[name] });
  }
  var result = {};
  if (times.length === 0) return result;
  times.sort(function(a, b) { return a.time - b.time; });
  var fastest = times[0].time;
  for (var i = 0; i < times.length; i++) {
    result[times[i].name] = Math.round(TIME_MAX_POINTS * fastest / times[i].time);
  }
  return result;
}

// ---- API ----
function api(method, path, body) {
  var opts = { method: method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(path, opts).then(function(r) {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  });
}

function refresh() {
  return api('GET', '/api/data').then(function(data) {
    serverOffset = Math.round(data.serverTime * 1000 - Date.now());
    delete data.serverTime;
    S = data;
    return S;
  });
}

// ---- Polling & Tick ----
function startPoll() {
  stopPoll();
  pollId = setInterval(function() {
    refresh().then(function() {
      if (activeScreen === 'leaderboard') renderLeaderboard();
      if (activeScreen === 'timer-view') renderMarkList();
      if (activeScreen === 'judge') renderJudgeList();
    }).catch(function() {});
  }, POLL_MS);
}
function stopPoll() { clearInterval(pollId); pollId = null; }
function startTick() { stopTick(); tickId = setInterval(renderTimerDisplay, 250); renderTimerDisplay(); }
function stopTick() { clearInterval(tickId); tickId = null; }

// ---- Navigation ----
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  activeScreen = id;
  stopPoll(); stopTick();

  refresh().then(function() {
    if (id === 'admin') renderAdmin();
    if (id === 'judge') renderJudgeList();
    if (id === 'leaderboard') { renderLeaderboard(); startPoll(); }
    if (id === 'timer-view') { renderTimerFull(); startPoll(); startTick(); }
    if (id === 'home') renderHome();
  }).catch(function() {});
  window.scrollTo(0, 0);
}

// ---- Home ----
function renderHome() {
  var t = S.teams.length;
  document.getElementById('homeStatus').innerHTML =
    '<span class="status-dot live"></span>Live &middot; ' + t + ' team' + (t !== 1 ? 's' : '');
}

// ---- Admin ----
function renderAdmin() {
  var el = document.getElementById('teamList');
  if (S.teams.length === 0) {
    el.innerHTML = '<div class="empty-state">No teams added yet.</div>';
    return;
  }
  var h = '';
  for (var i = 0; i < S.teams.length; i++) {
    h += '<div class="team-item" data-idx="' + i + '">' +
      '<span class="name">' + esc(S.teams[i]) + '</span>' +
      '<button class="remove-btn" data-idx="' + i + '" title="Remove">&times;</button>' +
    '</div>';
  }
  el.innerHTML = h;
  el.querySelectorAll('.remove-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      removeTeam(parseInt(this.dataset.idx));
    });
  });
}

function addTeam() {
  var inp = document.getElementById('newName');
  var name = inp.value.trim();
  if (!name) return;
  api('POST', '/api/teams/add', { name: name }).then(function() {
    inp.value = '';
    toast('Added ' + name);
    return refresh();
  }).then(renderAdmin).catch(function() { toast('Error adding team', true); });
}

function removeTeam(idx) {
  var name = S.teams[idx];
  if (!confirm('Remove "' + name + '"?\nThis deletes their scores too.')) return;
  api('POST', '/api/teams/remove', { name: name }).then(function() {
    toast('Removed ' + name);
    return refresh();
  }).then(renderAdmin).catch(function() { toast('Error', true); });
}

function startTimer() {
  if (S.timer && S.timer.running) {
    toast('Stopwatch already running');
    if (activeScreen !== 'timer-view') showScreen('timer-view');
    return;
  }
  api('POST', '/api/timer/start').then(function() {
    toast('Stopwatch started');
    return refresh();
  }).then(function() {
    if (activeScreen !== 'timer-view') showScreen('timer-view');
    else { renderTimerFull(); startTick(); }
  }).catch(function() { toast('Error', true); });
}

function stopTimer() {
  if (!S.timer || !S.timer.running) { toast('Not running'); return; }
  if (!confirm('Stop the stopwatch?')) return;
  api('POST', '/api/timer/stop').then(function() {
    toast('Stopwatch stopped');
    return refresh();
  }).then(function() {
    renderTimerFull();
  }).catch(function() { toast('Error', true); });
}

function resetTimer() {
  if (!confirm('Reset stopwatch and all completion times?')) return;
  api('POST', '/api/timer/reset').then(function() {
    toast('Stopwatch reset');
    return refresh();
  }).then(function() {
    renderTimerFull();
  }).catch(function() { toast('Error', true); });
}

function resetScores() {
  if (!confirm('Reset ALL scores and completion times?\nTeams will be kept.')) return;
  api('POST', '/api/reset-scores').then(function() {
    toast('Scores reset');
    return refresh();
  }).then(renderAdmin).catch(function() { toast('Error', true); });
}

function resetAll() {
  if (!confirm('Delete ALL teams, scores, and stopwatch?\nCannot be undone.')) return;
  api('POST', '/api/reset-all').then(function() {
    toast('Everything cleared');
    return refresh();
  }).then(renderAdmin).catch(function() { toast('Error', true); });
}

// ---- Judge ----
function showJudge(catIdx) {
  currentCatIdx = catIdx;
  var cat = CATEGORIES[catIdx];
  document.getElementById('judgeTitle').textContent = cat.name + ' (' + cat.max + 'pts)';

  var ref = '<table class="ref-table"><tr><th>Criterion</th><th>Max</th></tr>';
  for (var i = 0; i < cat.criteria.length; i++) {
    ref += '<tr><td>' + esc(cat.criteria[i].label) + '</td><td>' + cat.criteria[i].max + '</td></tr>';
  }
  ref += '</table>';
  document.getElementById('judgeRef').innerHTML = ref;

  showScreen('judge');
}

function renderJudgeList() {
  var cat = CATEGORIES[currentCatIdx];
  var el = document.getElementById('judgeTeams');
  if (S.teams.length === 0) {
    el.innerHTML = '<div class="empty-state">No teams. Add them in Admin.</div>';
    return;
  }
  var h = '';
  for (var i = 0; i < S.teams.length; i++) {
    var name = S.teams[i];
    var sc = S.scores[name] && S.scores[name][currentCatIdx];
    var total = 0;
    if (sc) { for (var j = 0; j < sc.length; j++) total += (sc[j] || 0); }
    h += '<div class="team-item' + (sc ? ' scored' : '') + '" data-team="' + i + '">' +
      '<span class="name">' + esc(name) + '</span>' +
      (sc ? '<span class="badge">' + total + '/' + cat.max + '</span>' : '') +
    '</div>';
  }
  el.innerHTML = h;
  // Wire up click handlers via data attribute (safe for any team name)
  el.querySelectorAll('.team-item').forEach(function(item) {
    item.addEventListener('click', function() {
      var idx = parseInt(this.dataset.team);
      openScoring(S.teams[idx]);
    });
  });
}

function backToJudge() { showJudge(currentCatIdx); }

// ---- Scoring ----
function openScoring(name) {
  currentTeam = name;
  var cat = CATEGORIES[currentCatIdx];
  document.getElementById('scoringTitle').textContent = name + ' \u2014 ' + cat.name;

  var existing = (S.scores[name] && S.scores[name][currentCatIdx]) || [];
  var h = '';
  for (var i = 0; i < cat.criteria.length; i++) {
    var c = cat.criteria[i];
    var val = existing[i] !== undefined ? existing[i] : '';
    h += '<div class="criterion-row">' +
      '<label>' + esc(c.label) + '</label>' +
      '<span class="max">/ ' + c.max + '</span>' +
      '<input type="number" min="0" max="' + c.max + '" value="' + val + '" ' +
        'data-max="' + c.max + '" class="score-input" ' +
        'oninput="clampAndSum(this)" inputmode="numeric">' +
    '</div>';
  }
  document.getElementById('scoringCriteria').innerHTML = h;
  updateScoringTotal();

  // Switch to scoring screen directly (don't go through showScreen to avoid re-fetch)
  var screens = document.querySelectorAll('.screen');
  for (var j = 0; j < screens.length; j++) screens[j].classList.remove('active');
  document.getElementById('scoring').classList.add('active');
  activeScreen = 'scoring';
  window.scrollTo(0, 0);
}

function clampAndSum(input) {
  var max = parseInt(input.getAttribute('data-max'));
  var val = parseInt(input.value);
  if (val > max) input.value = max;
  if (val < 0) input.value = 0;
  updateScoringTotal();
}

function updateScoringTotal() {
  var inputs = document.querySelectorAll('.score-input');
  var total = 0;
  for (var i = 0; i < inputs.length; i++) {
    var v = parseInt(inputs[i].value);
    if (!isNaN(v)) total += v;
  }
  document.getElementById('scoringTotal').textContent = total + ' / ' + CATEGORIES[currentCatIdx].max;
}

function submitScore() {
  var inputs = document.querySelectorAll('.score-input');
  var vals = [];
  for (var i = 0; i < inputs.length; i++) {
    var v = parseInt(inputs[i].value);
    vals.push(isNaN(v) ? 0 : v);
  }
  api('POST', '/api/scores', {
    name: currentTeam, category: currentCatIdx, values: vals
  }).then(function() {
    toast('Score saved for ' + currentTeam);
    return refresh();
  }).then(function() {
    backToJudge();
  }).catch(function() { toast('Error saving', true); });
}

// ---- Leaderboard ----
function renderLeaderboard() {
  var el = document.getElementById('leaderboardList');
  document.getElementById('lbStatus').innerHTML =
    '<span class="status-dot live"></span>Auto-refreshing every ' + (POLL_MS / 1000) + 's';

  if (S.teams.length === 0) {
    el.innerHTML = '<div class="empty-state">No teams yet.</div>';
    return;
  }

  var timeScores = calcAllTimeScores();
  var entries = [];
  for (var i = 0; i < S.teams.length; i++) {
    var name = S.teams[i];
    var judgeTotal = 0, catScores = [];
    for (var c = 0; c < CATEGORIES.length; c++) {
      var ct = 0;
      if (S.scores[name] && S.scores[name][c]) {
        var v = S.scores[name][c];
        for (var j = 0; j < v.length; j++) ct += (v[j] || 0);
      }
      catScores.push(ct);
      judgeTotal += ct;
    }
    var timePts = timeScores[name] || 0;
    var elapsed = (S.completionTimes || {})[name];
    entries.push({ name: name, total: judgeTotal + timePts, cats: catScores, timePts: timePts, elapsed: elapsed });
  }

  entries.sort(function(a, b) { return b.total - a.total; });

  var h = '';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var pct = TOTAL_MAX > 0 ? Math.round((e.total / TOTAL_MAX) * 100) : 0;
    var rc = i === 0 ? ' r1' : i === 1 ? ' r2' : i === 2 ? ' r3' : '';
    var timeLabel = e.elapsed != null ? fmtTime(e.elapsed) : 'DNF';
    h += '<div class="lb-item">' +
      '<div class="lb-rank' + rc + '">' + (i + 1) + '</div>' +
      '<div class="lb-info">' +
        '<div class="lb-name">' + esc(e.name) + '</div>' +
        '<div class="lb-score">' + e.total + ' / ' + TOTAL_MAX + ' pts</div>' +
        '<div class="lb-bar-bg"><div class="lb-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="lb-cats">';
    for (var c = 0; c < CATEGORIES.length; c++) {
      h += '<span class="lb-cat">' + CATEGORIES[c].name + ': ' + e.cats[c] + '</span>';
    }
    h += '<span class="lb-cat time-cat">Time: ' + e.timePts + '/' + TIME_MAX_POINTS + ' (' + timeLabel + ')</span>';
    h += '</div></div></div>';
  }
  el.innerHTML = h;
}

// ---- Timer / Stopwatch ----
function renderTimerFull() { renderTimerDisplay(); renderMarkList(); }

function renderTimerDisplay() {
  var display = document.getElementById('timerDisplay');
  var label = document.getElementById('timerLabel');
  var t = S.timer;

  if (!t) {
    display.textContent = '00:00';
    display.className = 'timer-time';
    label.textContent = 'Ready';
    return;
  }

  var elapsed;
  if (t.running) {
    elapsed = (serverNow() / 1000) - t.startTime;
  } else {
    elapsed = (t.stoppedAt || t.startTime) - t.startTime;
  }
  elapsed = Math.max(0, elapsed);
  display.textContent = fmtTime(elapsed);
  display.className = 'timer-time';
  label.textContent = t.running ? 'Running' : 'Stopped at';
}

function renderMarkList() {
  var section = document.getElementById('markSection');
  var el = document.getElementById('markList');
  var t = S.timer;

  if (!t || S.teams.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  var timeScores = calcAllTimeScores();
  var h = '';

  for (var i = 0; i < S.teams.length; i++) {
    var name = S.teams[i];
    var elapsed = (S.completionTimes || {})[name];
    var done = elapsed != null;
    var pts = timeScores[name] || 0;

    h += '<div class="mark-item' + (done ? ' marked' : '') + '">';
    h += '<span class="name">' + esc(name) + '</span>';

    if (done) {
      h += '<span class="mark-pts">' + pts + '/' + TIME_MAX_POINTS + ' pts</span>';
      h += '<span class="mark-time">' + fmtTime(elapsed) + '</span>';
      h += '<button class="undo-btn" data-team="' + i + '">Undo</button>';
    } else if (t.running) {
      h += '<button class="mark-btn" data-team="' + i + '">Mark Time</button>';
    } else {
      h += '<span class="mark-time" style="color:var(--red)">DNF</span>';
      h += '<span class="mark-pts">0/' + TIME_MAX_POINTS + '</span>';
    }
    h += '</div>';
  }
  el.innerHTML = h;

  // Wire up mark/undo buttons via data attributes
  el.querySelectorAll('.mark-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.team);
      markTime(S.teams[idx]);
    });
  });
  el.querySelectorAll('.undo-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.team);
      unmarkTime(S.teams[idx]);
    });
  });
}

function markTime(name) {
  var t = S.timer;
  if (!t || !t.running) return;
  var elapsed = (serverNow() / 1000) - t.startTime;
  if (!confirm('Mark ' + name + ' at ' + fmtTime(elapsed) + '?')) return;

  api('POST', '/api/mark-time', { name: name }).then(function() {
    toast(name + ' marked!');
    return refresh();
  }).then(renderMarkList).catch(function() { toast('Error', true); });
}

function unmarkTime(name) {
  if (!confirm('Undo time for ' + name + '?')) return;
  api('POST', '/api/unmark-time', { name: name }).then(function() {
    toast('Time cleared for ' + name);
    return refresh();
  }).then(renderMarkList).catch(function() { toast('Error', true); });
}

// ---- Init ----
refresh().then(function() {
  renderHome();
}).catch(function() {
  document.getElementById('homeStatus').innerHTML =
    '<span class="status-dot off"></span>Cannot connect to server';
});
</script>
</body>
</html>
